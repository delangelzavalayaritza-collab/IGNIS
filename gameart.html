<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beat the Dragon!</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Bangers', cursive;
    background: url('img/garrt.jpeg') center/cover no-repeat fixed;
    text-align: center;
    color: #fff;
    overflow: hidden;
  }

  /* 🎥 Video background */
  #bgVideo {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: -1;
    filter: brightness(0.6);
  }

  h1 {
    font-size: 4rem;
    color: #ffcc00;
    text-shadow: 3px 3px 0 #ff4500, 6px 6px 10px rgba(0, 0, 0, 0.6);
  }

  p {
    font-size: 1.8rem;
    text-shadow: 2px 2px 5px #000;
  }

  .pad-container {
    display: flex;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
    margin-top: 2rem;
  }

  .pad {
    width: 120px;
    height: 120px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }

  .pad:active {
    transform: scale(0.95);
    box-shadow: 0 0 20px #fff;
  }

  .pad:nth-child(1) { background: #ff4d4d; }
  .pad:nth-child(2) { background: #4dff4d; }
  .pad:nth-child(3) { background: #4da6ff; }
  .pad:nth-child(4) { background: #ffff66; }

  #startBtn {
    margin-top: 2rem;
    background: #009688;
    border: none;
    color: #000;
    font-size: 1.5rem;
    border-radius: 25px;
    padding: 0.8rem 2rem;
    cursor: pointer;
    transition: 0.3s;
  }

  #startBtn:hover {
    background: #00796b;
    color: #fff;
  }

  #status {
    font-size: 2rem;
    margin-top: 1rem;
    text-shadow: 2px 2px 5px #000;
  }

  .mascot {
    position: fixed;
    bottom: 10px;
    left: 10px;
    width: 180px;
    opacity: 0.95;
  }
</style>
</head>
<body>

<!-- 🎬 Background video -->
<video autoplay muted loop id="bgVideo">
  <source src="video/fondo.mp4" type="video/mp4">
</video>

<h1>Beat the Dragon!</h1>
<p>Listen carefully and repeat the rhythm!</p>

<div class="pad-container">
  <button class="pad" data-sound="1"></button>
  <button class="pad" data-sound="2"></button>
  <button class="pad" data-sound="3"></button>
  <button class="pad" data-sound="4"></button>
</div>

<button id="startBtn">▶️ Start Game</button>
<p id="status"></p>

<!-- 🐉 Mascot -->
<!-- <img src="img/dragon.png" class="mascot" alt="Mascot"> -->

<!-- 🎵 Sounds -->
<audio id="sound1" src="ef/s1.wav"></audio>
<audio id="sound2" src="ef/s2.wav"></audio>
<audio id="sound3" src="ef/s3.wav"></audio>
<audio id="sound4" src="ef/s4.wav"></audio>
<audio id="win" src="ef/yupi.m4a"></audio>
<audio id="error" src="ef/error.wav"></audio>

<!-- 🎊 Confetti library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<script>
  const pads = document.querySelectorAll('.pad');
  const startBtn = document.getElementById('startBtn');
  const status = document.getElementById('status');
  const sounds = [
    document.getElementById('sound1'),
    document.getElementById('sound2'),
    document.getElementById('sound3'),
    document.getElementById('sound4')
  ];
  const winSound = document.getElementById('win');
  const errorSound = document.getElementById('error');

  let sequence = [];
  let playerSequence = [];
  let level = 1;
  let playing = false;

  startBtn.addEventListener('click', startGame);

  function startGame() {
    level = 1;
    sequence = [];
    status.textContent = "🎵 Listen to the rhythm...";
    nextRound();
  }

  function nextRound() {
    status.textContent = `Round ${level}`;
    playerSequence = [];
    sequence.push(Math.floor(Math.random() * 4));
    playSequence();
  }

  function playSequence() {
    playing = true;
    let i = 0;
    const interval = setInterval(() => {
      const pad = pads[sequence[i]];
      playSound(sequence[i]);
      flashPad(pad);
      i++;
      if (i >= sequence.length) {
        clearInterval(interval);
        playing = false;
        status.textContent = "👂 Your turn!";
      }
    }, 800);
  }

  pads.forEach((pad, index) => {
    pad.addEventListener('click', () => {
      if (playing) return;
      playSound(index);
      flashPad(pad);
      playerSequence.push(index);
      checkInput();
    });
  });

  function playSound(i) {
    sounds[i].currentTime = 0;
    sounds[i].play();
  }

  function flashPad(pad) {
    pad.style.boxShadow = '0 0 30px #fff';
    setTimeout(() => pad.style.boxShadow = '', 300);
  }

  function checkInput() {
    const current = playerSequence.length - 1;

    // ❌ Wrong input
    if (playerSequence[current] !== sequence[current]) {
      errorSound.currentTime = 0;
      errorSound.play();
      status.textContent = '❌ You failed! The dragon wins this round!';
      playing = true;
      setTimeout(() => {
        startGame();
      }, 2000);
      return;
    }

    // ✅ Correct input
    if (playerSequence.length === sequence.length) {
      winSound.currentTime = 0;
      winSound.play();
      status.textContent = '✅ Great job!';
      fiestaConfetti();
      level++;
      playing = true;
      setTimeout(() => {
        nextRound();
      }, 1500);
    }
  }

  function fiestaConfetti() {
    const duration = 1000;
    const end = Date.now() + duration;

    (function frame() {
      confetti({
        particleCount: 10,
        angle: 60,
        spread: 100,
        origin: { x: 0 },
        colors: ['#ff0', '#ff4500', '#00ffea', '#ff00ff']
      });
      confetti({
        particleCount: 10,
        angle: 120,
        spread: 100,
        origin: { x: 1 },
        colors: ['#ff0', '#ff4500', '#00ffea', '#ff00ff']
      });
      if (Date.now() < end) requestAnimationFrame(frame);
    })();
  }
</script>

</body>
</html>
