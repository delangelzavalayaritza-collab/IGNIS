<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover"
>

<title>IGNIS</title>

<link rel="stylesheet" href="btn.css?v=5">

<style>

/* ======================
   PANTALLA GIRAR CELU
====================== */

#rotateMessage{
  position:fixed;
  inset:0;
  background:#0b0b0b;
  color:white;

  display:none;
  justify-content:center;
  align-items:center;

  text-align:center;
  z-index:99999;
  padding:20px;
}

.rotate-box{
  max-width:320px;
}

.rotate-box h2{
  font-size:2rem;
  margin-bottom:15px;
}

.rotate-box p{
  font-size:1.1rem;
}

/* ======================
   BOTON ACCESIBILIDAD
====================== */

.voice-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  z-index:9999;

  border:none;
  border-radius:50px;

  padding:12px 18px;

  background:
  rgba(255,102,0,.95);

  color:white;
  font-size:14px;
  cursor:pointer;

  box-shadow:
  0 4px 15px
  rgba(255,100,0,.35);

  transition:.3s;
}

.voice-btn:hover{
  transform:scale(1.05);
}

/* ======================
   CELULAR
====================== */

@media screen and (max-width:900px){

  /* vertical */
  @media (orientation:portrait){

    #rotateMessage{
      display:flex;
    }

    .hero{
      display:none !important;
    }
  }

  /* horizontal */
  @media (orientation:landscape){

    .voice-btn{
      bottom:12px;
      right:12px;

      font-size:12px;
      padding:9px 14px;
    }
  }
}

</style>
</head>

<body>

<!-- AUDIO -->
<audio
id="introSound"
loop
preload="auto"
>
  <source
  src="cutt.mp3"
  type="audio/mpeg">
</audio>

<!-- MENSAJE GIRAR -->

<div id="rotateMessage">

  <div class="rotate-box">

    <h2>
      📱 Gira tu dispositivo
    </h2>

    <p>
      Para jugar IGNIS mejor,
      usa tu teléfono
      en posición horizontal.
    </p>

  </div>

</div>

<!-- CONTENIDO -->

<div class="hero">

  <!-- BOTON ACCESIBILIDAD -->

  <button
  id="voiceMode"
  class="voice-btn">

    🔊 Accesibilidad

  </button>

  <!-- TITULO -->

  <h1
  class="title"
  id="titleVoice">

    IGNIS

    <span class="flames">

      <span class="flame"></span>
      <span class="flame"></span>
      <span class="flame"></span>
      <span class="flame"></span>
      <span class="flame"></span>
      <span class="flame"></span>
      <span class="flame"></span>
      <span class="flame"></span>

    </span>

  </h1>

  <!-- SUB -->

  <p
  class="subtitle"
  id="subtitleVoice">

    LEARNING

  </p>

  <!-- BOTON -->

  <a
  href="menu.html"
  class="fire-button"
  id="fireBtn">

    LET'S GO!

  </a>

  <!-- BURBUJAS -->

  <div class="bubbles-container">

    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>

  </div>

  <!-- LOGO -->

  <a
  href="http://www.utaltamira.edu.mx/"
  target="_blank">

    <img
    src="img/logo_ut.png"
    alt="Logo Universidad Tecnológica de Altamira"
    class="ut-logo">

  </a>

  <!-- DRAGON -->

  <img
  src="img/dragon.png"
  alt="Dragón flotante"
  class="floating-dragon">

</div>

<script>

/* ======================
   ESCONDER BARRA MOVIL
====================== */

window.addEventListener(
"load",
()=>{

  setTimeout(()=>{

    window.scrollTo(0,1);

  },100);

}
);

/* ======================
   ELEMENTOS
====================== */

const voiceBtn =
document.getElementById(
"voiceMode"
);

const fireBtn =
document.getElementById(
"fireBtn"
);

const title =
document.getElementById(
"titleVoice"
);

const subtitle =
document.getElementById(
"subtitleVoice"
);

const audio =
document.getElementById(
"introSound"
);

let accessibilityOn =
false;

/* ======================
   FUNCION HABLAR
====================== */

function speak(text){

  speechSynthesis.cancel();

  const speech =
  new SpeechSynthesisUtterance(
    text
  );

  speech.lang =
  "es-MX";

  speech.rate = 1;
  speech.pitch = 1;

  speechSynthesis.speak(
    speech
  );
}

/* ======================
   AUDIO + VOZ CELULAR
====================== */

let firstInteraction =
false;

function startExperience(){

  if(firstInteraction)
  return;

  firstInteraction = true;

  /* despierta speech del celu */
  const unlockSpeech =
  new SpeechSynthesisUtterance("");

  unlockSpeech.volume = 0;

  speechSynthesis.speak(
    unlockSpeech
  );

  /* pequeña espera */
  setTimeout(()=>{

    speak(
      "Bienvenido a Ignis Learning. Si necesitas asistencia por voz, toca el botón de accesibilidad, que se encuentra en la parte inferior derecha."
    );

  },300);

  /* musica después */
  setTimeout(()=>{

    audio.play()
    .catch(()=>{});

  },3200);
}


/* laptop */
document.addEventListener(
"click",
startExperience,
{once:true}
);

/* celular */
document.addEventListener(
"touchstart",
startExperience,
{once:true}
);

/* ======================
   BOTON ACCESIBILIDAD
====================== */

function announceButton(){

  speak(
    accessibilityOn
    ? "Desactivar voz"
    : "Activar voz"
  );
}

voiceBtn.addEventListener(
"mouseenter",
announceButton
);

voiceBtn.addEventListener(
"touchstart",
announceButton
);

voiceBtn.addEventListener(
"click",
()=>{

  accessibilityOn =
  !accessibilityOn;

  if(accessibilityOn){

    speak(
      "Modo accesible activado."
    );

    voiceBtn.innerHTML =
    "🔇 Desactivar Voz";

  }else{

    speechSynthesis.cancel();

    voiceBtn.innerHTML =
    "🔊 Accesibilidad";
  }

}
);

/* ======================
   LECTURA INTERACTIVA
====================== */

function voiceInteraction(
element,
text
){

  element.addEventListener(
  "mouseenter",
  ()=>{
    if(accessibilityOn)
    speak(text);
  });

  element.addEventListener(
  "touchstart",
  ()=>{
    if(accessibilityOn)
    speak(text);
  });

}

voiceInteraction(
title,
"Ignis"
);

voiceInteraction(
subtitle,
"Learning"
);

voiceInteraction(
fireBtn,
"Lets Go. Presiona para comenzar."
);

</script>

</body>
</html>
