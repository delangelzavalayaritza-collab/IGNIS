<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">

<title>IGNIS</title>

<link rel="stylesheet" href="btn.css?v=5">

<style>

/* =========================
   RESET
========================= */

html,
body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  overflow-x:hidden;
}

/* =========================
   HERO
========================= */

.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* =========================
   ROTATE SCREEN
========================= */

#rotateMessage{
  position:fixed;
  inset:0;
  background:#0b0b0b;
  color:white;
  display:none;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:99999;
  padding:20px;
}

.rotate-box{
  max-width:320px;
}

.rotate-box h2{
  font-size:2rem;
  margin-bottom:10px;
}

/* =========================
   ACCESSIBILITY BUTTON
========================= */

.voice-btn{
  position:fixed;
  bottom:15px;
  right:15px;
  z-index:9999;

  border:none;
  border-radius:50px;
  padding:12px 18px;

  background:rgba(255,102,0,.95);
  color:white;
  font-size:14px;

  cursor:pointer;

  box-shadow:
  0 4px 15px rgba(255,100,0,.35);

  transition:.3s;
}

.voice-btn:hover{
  transform:scale(1.05);
}

/* =========================
   CELULAR
========================= */

@media screen and (max-width:950px){

  /* VERTICAL */
  @media (orientation:portrait){

    #rotateMessage{
      display:flex;
    }

    .hero{
      display:none !important;
    }
  }

  /* HORIZONTAL */
  @media (orientation:landscape){

    html,
    body{
      height:100dvh;
      overflow:hidden;
    }

    .hero{
      min-height:100dvh;
      justify-content:center;
      padding:12px;
      text-align:center;
    }

    /* TITULO */
    .title{
      font-size:4rem !important;
      margin:0 !important;
      position:relative;
      z-index:5;
    }

    .subtitle{
      font-size:1.2rem !important;
      margin-top:-5px;
      z-index:5;
    }

    /* LLAMAS */
    .flames{
      position:absolute !important;
      top:-30px !important;
      left:50% !important;
      transform:
      translateX(-50%)
      scale(.9) !important;
    }

    /* BOTON */
    .fire-button{
      margin-top:18px !important;
      z-index:5;
    }

    /* DRAGON */
    .floating-dragon{
      width:160px !important;
      position:absolute !important;
      bottom:20px !important;
      right:20px !important;
    }

    /* LOGO */
    .ut-logo{
      width:70px !important;
      position:absolute;
      top:10px;
      left:10px;
    }

    /* BURBUJAS */
    .bubbles-container{
      position:absolute;
      inset:0;
      overflow:hidden;
      pointer-events:none;
    }

    .voice-btn{
      bottom:12px;
      right:12px;
      font-size:13px;
      padding:10px 14px;
    }

  }
}

</style>
</head>

<body>

<!-- AUDIO -->
<audio id="introSound" loop>
  <source src="cutt.mp3" type="audio/mpeg">
</audio>

<!-- GIRAR CELU -->
<div id="rotateMessage">
  <div class="rotate-box">
    <h2>Gira tu dispositivo</h2>
    <p>
      Usa IGNIS en horizontal
      para una mejor experiencia.
    </p>
  </div>
</div>

<div class="hero">

  <!-- ACCESIBILIDAD -->
  <button
    id="voiceMode"
    class="voice-btn"
  >
    🔊 Accesibilidad
  </button>

  <!-- TITULO -->
  <h1
    class="title"
    id="titleVoice"
  >
    IGNIS

    <span class="flames">
      <span class="flame"></span>
      <span class="flame"></span>
      <span class="flame"></span>
      <span class="flame"></span>
      <span class="flame"></span>
      <span class="flame"></span>
      <span class="flame"></span>
      <span class="flame"></span>
    </span>
  </h1>

  <!-- SUBTITLE -->
  <p
    class="subtitle"
    id="subtitleVoice"
  >
    LEARNING
  </p>

  <!-- BOTON -->
  <a
    href="menu.html"
    class="fire-button"
    id="fireBtn"
  >
    LET'S GO!
  </a>

  <!-- BURBUJAS -->
  <div class="bubbles-container">
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
  </div>

  <!-- LOGO -->
  <a
    href="http://www.utaltamira.edu.mx/"
    target="_blank"
  >
    <img
      src="img/logo_ut.png"
      alt="Logo UT"
      class="ut-logo"
    >
  </a>

  <!-- DRAGON -->
  <img
    src="img/dragon.png"
    alt="Dragón"
    class="floating-dragon"
  >

</div>

<script>

const audio =
document.getElementById(
"introSound"
);

const voiceBtn =
document.getElementById(
"voiceMode"
);

const fireBtn =
document.getElementById(
"fireBtn"
);

const title =
document.getElementById(
"titleVoice"
);

const subtitle =
document.getElementById(
"subtitleVoice"
);

let accessibilityOn =
false;

/* ===================
   HABLAR
=================== */

function speak(text){

  speechSynthesis.cancel();

  const speech =
  new SpeechSynthesisUtterance(
  text
  );

  speech.lang="es-MX";
  speech.rate=1;
  speech.pitch=1;

  speechSynthesis.speak(
  speech
  );
}

/* ===================
   ESCONDER BARRA
=================== */

window.addEventListener(
"load",
()=>{

  setTimeout(()=>{

    window.scrollTo(
    0,
    1
    );

  },100);

});

/* ===================
   AUDIO MOVIL
=================== */

function startAudio(){

  audio.play().catch(()=>{});

  document.removeEventListener(
  "touchstart",
  startAudio
  );

  document.removeEventListener(
  "click",
  startAudio
  );
}

document.addEventListener(
"touchstart",
startAudio
);

document.addEventListener(
"click",
startAudio
);

/* ===================
   MENSAJE AUTOMATICO
=================== */

window.addEventListener(
"load",
()=>{

  setTimeout(()=>{

    speak(
    "Bienvenido a Ignis Learning. " +
    "Para activar asistencia por voz, " +
    "presiona el botón de accesibilidad " +
    "abajo a la derecha."
    );

  },1800);

});

/* ===================
   BOTON VOZ
=================== */

function announceButton(){

  speak(
  accessibilityOn
  ? "Desactivar voz"
  : "Activar voz"
  );
}

voiceBtn.addEventListener(
"mouseenter",
announceButton
);

voiceBtn.addEventListener(
"touchstart",
announceButton
);

voiceBtn.addEventListener(
"click",
()=>{

  accessibilityOn =
  !accessibilityOn;

  if(accessibilityOn){

    speak(
    "Modo accesible activado."
    );

    voiceBtn.innerHTML=
    "🔇 Desactivar Voz";

  }else{

    speechSynthesis.cancel();

    voiceBtn.innerHTML=
    "🔊 Accesibilidad";
  }

});

/* ===================
   LECTURA
=================== */

function voiceInteraction(
element,
text
){

  element.addEventListener(
  "mouseenter",
  ()=>{
    if(accessibilityOn)
    speak(text);
  });

  element.addEventListener(
  "touchstart",
  ()=>{
    if(accessibilityOn)
    speak(text);
  });

}

voiceInteraction(
title,
"Ignis"
);

voiceInteraction(
subtitle,
"Learning"
);

voiceInteraction(
fireBtn,
"Lets Go. Presiona para comenzar."
);

</script>

</body>
</html>
